# Enable 24-bit true color support for xterm-compatible terminals
set-option -sa terminal-overrides ",xterm*:Tc"

# enable mouse
set -g mouse on

# ── Prefix ────────────────────────────────────────────────────────────────────
# Change prefix from C-b to C-Space (easier to reach)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Pane splitting ────────────────────────────────────────────────────────────
# s: horizontal split, v: vertical split — both inherit the current path
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# ── Pane resizing ─────────────────────────────────────────────────────────────
# < > - +: nudge pane edges by 10 cells; = resets to equal halves
bind < resize-pane -L 10
bind > resize-pane -R 10
bind - resize-pane -D 10
bind + resize-pane -U 10
bind = resize-pane -x 50% -y 50%

# ── Neovim + Claude layout ────────────────────────────────────────────────────
# C-Space C: open nvim on the left and claude on the right in a new split
# sleep 2 gives nvim time to start before claude attaches
bind C send-keys "nvim" Enter \; split-window -v -c "#{pane_current_path}" \; send-keys "sleep 2 && claude" Enter

# ── Vi mode ───────────────────────────────────────────────────────────────────
# Use vi keys in copy mode (e.g. v to select, y to yank)
set-window-option -g mode-keys vi

# ── Pane management ───────────────────────────────────────────────────────────
# Kill pane without the confirmation prompt
bind x kill-pane

# ── Window numbering ──────────────────────────────────────────────────────────
# Start windows and panes at 1 (not 0) and close gaps when a window is closed
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ── Sessionizer ───────────────────────────────────────────────────────────────
# f: fuzzy-find and switch/create tmux sessions via tmux-sessionizer script
bind-key -r f run-shell "tmux neww ~/.config/tmux/scripts/tmux-sessionizer"

# ── Theme ─────────────────────────────────────────────────────────────────────
set -g @catppuccin_flavour 'everforest'

# ── Plugins (managed by tpm) ──────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'           # plugin manager
set -g @plugin 'tmux-plugins/tmux-resurrect' # save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-sensible'  # sane defaults
set -g @plugin 'christoomey/vim-tmux-navigator' # seamless vim/tmux pane navigation
set -g @plugin 'lcford2/tmux-themes'         # custom themes
set -g @plugin 'sainnhe/tmux-fzf'            # fzf integration for tmux

# Initialize tpm (must be the last line)
run '~/.tmux/plugins/tpm/tpm'
